name: Deploy to Production

on:
  push:
    branches:
      - main
      - deployment/*
  pull_request:
    branches:
      - main
      - deployment/*

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Test Backend
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6.0
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand(\"ping\")'
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: Backend/package-lock.json
      
      - name: Install dependencies
        working-directory: Backend
        run: npm ci
      
      - name: Run ESLint
        working-directory: Backend
        run: npm run lint --if-present
        continue-on-error: true
      
      - name: Run tests
        working-directory: Backend
        env:
          MONGODB_URI: mongodb://localhost:27017/lms-test
          JWT_SECRET: test-secret-key
          NODE_ENV: test
        run: npm test --if-present
        continue-on-error: true

  # Test Frontend
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: Frontend
        run: npm ci
      
      - name: Run ESLint
        working-directory: Frontend
        run: npm run lint --if-present
        continue-on-error: true
      
      - name: Build frontend
        working-directory: Frontend
        env:
          VITE_API_BASE_URL: https://api.example.com/api
        run: npm run build
      
      - name: Run tests
        working-directory: Frontend
        run: npm test --if-present
        continue-on-error: true

  # Build and Push Docker Images
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/deployment/'))
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./Backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:buildcache,mode=max
      
      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./Frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:buildcache,mode=max

  # Security Scanning
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          cd Backend && npm ci
          cd ../Frontend && npm ci
      
      - name: Run npm audit
        run: |
          npm audit --audit-level=moderate 2>&1 | tee audit.log
          if grep -q "found.*vulnerabilities"; then
            echo "Vulnerabilities found - review audit.log"
            exit 0  # Don't fail on vulnerabilities, just report
          fi
      
      - name: Upload audit results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: npm-audit-report
          path: audit.log

  # Deploy to Staging (optional)
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/deployment/*' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy backend to staging
        env:
          DEPLOY_TOKEN: ${{ secrets.HEROKU_API_KEY }}
          APP_NAME: lms-api-staging
        run: |
          if [ -n "$DEPLOY_TOKEN" ]; then
            echo "Deploying backend to Heroku..."
            git remote add heroku-staging https://git.heroku.com/$APP_NAME.git
            git push heroku-staging HEAD:main
          fi
      
      - name: Deploy frontend to staging
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then
            echo "Deploying frontend to Vercel..."
            npm install -g vercel
            cd Frontend && vercel deploy --prod --token=$VERCEL_TOKEN
          fi

  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Deploy backend
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP_NAME: lms-api-prod
        run: |
          if [ -n "$HEROKU_API_KEY" ]; then
            npm install -g heroku
            heroku login -i
            git push https://git.heroku.com/$HEROKU_APP_NAME.git main
          fi
      
      - name: Deploy frontend to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then
            npm install -g vercel
            cd Frontend && vercel deploy --prod --token=$VERCEL_TOKEN
          fi
      
      - name: Run smoke tests
        run: |
          # Wait for deployment
          sleep 30
          
          # Test API health
          if curl -f https://lms-api.herokuapp.com/api/health; then
            echo "✓ Backend health check passed"
          else
            echo "✗ Backend health check failed"
            exit 1
          fi
          
          # Test frontend
          if curl -f https://lms-frontend.vercel.app; then
            echo "✓ Frontend is accessible"
          else
            echo "✗ Frontend is not accessible"
            exit 1
          fi
      
      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Production Deployment: ${{ job.status }}\n*Repository:* ${{ github.repository }}\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}"
                  }
                }
              ]
            }
