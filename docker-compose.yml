version: '3.8'

services:
  # Backend API Service
  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: lms-api
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/lms}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-here}
      - PORT=5000
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - lms-network
    restart: unless-stopped
    volumes:
      - ./Backend:/app
      - /app/node_modules
      - lms-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Service (Vite dev server)
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: lms-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://api:5000/api
    depends_on:
      - api
    networks:
      - lms-network
    restart: unless-stopped
    volumes:
      - ./Frontend:/app
      - /app/node_modules

  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: lms-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-password}
      - MONGO_INITDB_DATABASE=lms
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
    networks:
      - lms-network
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # MongoDB Express (Web UI for MongoDB) - Optional
  mongo-express:
    image: mongo-express:latest
    container_name: lms-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_USER:-admin}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_PASSWORD:-password}
      - ME_CONFIG_MONGODB_URL=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/
    depends_on:
      - mongodb
    networks:
      - lms-network
    restart: unless-stopped

volumes:
  mongodb-data:
    driver: local
  mongodb-config:
    driver: local
  lms-uploads:
    driver: local

networks:
  lms-network:
    driver: bridge
